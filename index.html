<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- BROWSER TAB -->
  <title>Darkarrow — something is coming</title>

  <!-- DISCORD / TWITTER / FACEBOOK RICH EMBED -->
  <meta name="description" content="Something big is dropping. Countdown is live." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="darkarrow.lol" />
  <meta property="og:title" content="Darkarrow — something is coming" />
  <meta property="og:description" content="not_darkarrow — Twitch streamer, Minecraft server builder. Something big is coming." />
  <meta property="og:image" content="https://darkarrow.lol/preview.png" />
  <meta property="og:url" content="https://darkarrow.lol" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Darkarrow — something is coming" />
  <meta name="twitter:description" content="not_darkarrow has something big dropping. The countdown is live." />
  <meta name="twitter:image" content="https://darkarrow.lol/preview.png" />
  <meta name="theme-color" content="#6b21a8" />

  <!-- FAVICON -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23080810'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='22' font-weight='900' font-family='Arial' fill='%236b21a8'>D</text></svg>" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;overflow-x:hidden}
    body{background:#080810;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;position:relative}

    #particles{position:fixed;inset:0;z-index:0;pointer-events:none}
    .scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1}
    .corner{position:fixed;width:22px;height:22px;z-index:2}
    .corner.tl{top:24px;left:24px;border-top:1.5px solid var(--accent);border-left:1.5px solid var(--accent)}
    .corner.tr{top:24px;right:24px;border-top:1.5px solid var(--accent);border-right:1.5px solid var(--accent)}
    .corner.bl{bottom:24px;left:24px;border-bottom:1.5px solid var(--accent);border-left:1.5px solid var(--accent)}
    .corner.br{bottom:24px;right:24px;border-bottom:1.5px solid var(--accent);border-right:1.5px solid var(--accent)}

    :root{--accent:#6b21a8;--accent2:#a855f7}

    /* ANNOUNCEMENT */
    #announcement-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:100;padding:10px 48px 10px 20px;font-size:13px;font-weight:600;letter-spacing:0.04em;text-align:center;line-height:1.4}
    #announcement-banner.style-purple{background:var(--accent);color:#fff}
    #announcement-banner.style-dark{background:#0e0e1a;color:#f0f0f0;border-bottom:1px solid #2a2a3a}
    #announcement-banner.style-white{background:#f0f0f0;color:#080810}
    #banner-close{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;line-height:1;opacity:0.6;padding:4px;color:inherit}
    #banner-close:hover{opacity:1}
    #banner-link{color:inherit;font-weight:700;margin-left:8px;opacity:0.85}

    /* CONTENT */
    .content{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;padding:2rem 1.5rem;width:100%;max-width:700px}

    /* TYPING EYEBROW */
    .eyebrow{font-size:10px;letter-spacing:0.35em;color:#444;text-transform:uppercase;margin-bottom:1.4rem;min-height:14px}
    .cursor{display:inline-block;width:6px;height:11px;background:#444;margin-left:2px;animation:cur 0.8s step-end infinite;vertical-align:middle}
    @keyframes cur{0%,100%{opacity:1}50%{opacity:0}}

    /* GLITCH LOGO */
    .logo{font-size:clamp(42px,8vw,72px);font-weight:900;letter-spacing:-0.03em;line-height:1;margin-bottom:0.5rem;text-align:center;position:relative;cursor:default;user-select:none}
    .logo-dark{color:#f0f0f0}
    .logo-files{color:var(--accent)}
    .logo.glitching .logo-dark{animation:glitch-a 0.3s steps(2) infinite}
    .logo.glitching .logo-files{animation:glitch-b 0.3s steps(2) infinite}
    @keyframes glitch-a{0%{text-shadow:2px 0 var(--accent),-2px 0 var(--accent2);clip-path:inset(10% 0 80% 0)}25%{clip-path:inset(50% 0 30% 0)}50%{text-shadow:2px 2px var(--accent);clip-path:inset(70% 0 5% 0)}100%{text-shadow:none;clip-path:none}}
    @keyframes glitch-b{0%{text-shadow:-2px 0 #f0f0f0,2px 0 var(--accent);clip-path:inset(60% 0 20% 0)}50%{clip-path:inset(20% 0 70% 0)}100%{text-shadow:none;clip-path:none}}

    #tagline{font-size:11px;color:#444;letter-spacing:0.2em;text-transform:uppercase;text-align:center;margin-bottom:0.9rem}

    .twitch-link{display:inline-flex;align-items:center;gap:7px;background:#0e0e1a;border:0.5px solid #1e1e2e;border-radius:20px;padding:6px 14px;margin-bottom:2rem;text-decoration:none;transition:border-color 0.2s}
    .twitch-link:hover{border-color:var(--accent)}
    .twitch-icon{width:14px;height:14px;fill:#9147ff}
    .twitch-name{font-size:12px;color:#9147ff;letter-spacing:0.05em}

    /* FLIP COUNTDOWN */
    .countdown{display:flex;gap:10px;align-items:flex-start;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}
    .unit{display:flex;flex-direction:column;align-items:center}
    .flip-box{background:#0c0c18;border:0.5px solid #1a1a2a;border-radius:8px;padding:18px 6px 14px;min-width:80px;text-align:center;position:relative;overflow:hidden;perspective:400px}
    .flip-box::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--accent);opacity:0.6}
    .flip-box::before{content:'';position:absolute;top:50%;left:0;right:0;height:0.5px;background:rgba(0,0,0,0.4);z-index:2}
    .num{font-size:40px;font-weight:800;color:#f0f0f0;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;font-family:'Courier New',monospace;display:block;transition:transform 0.15s ease-in,opacity 0.15s}
    .num.flip-out{transform:rotateX(90deg);opacity:0}
    .num.flip-in{transform:rotateX(0deg);opacity:1}
    .lbl{font-size:9px;letter-spacing:0.22em;color:#3a3a4a;text-transform:uppercase;margin-top:6px}
    .sep{font-size:30px;font-weight:700;color:#1e1e2e;margin-top:16px;line-height:1;user-select:none}

    .progress-track{width:300px;max-width:90vw;height:2px;background:#12121e;border-radius:1px;margin-bottom:2rem}
    .progress-fill{height:2px;background:var(--accent);border-radius:1px;width:0%;transition:width 0.8s linear}

    .status{display:flex;align-items:center;gap:8px;margin-bottom:2rem}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.5s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
    .status-text{font-size:10px;letter-spacing:0.25em;color:#2e2e3e;text-transform:uppercase}

    /* HYPE METER */
    #hype-section{width:100%;max-width:400px;margin-bottom:2rem;display:none}
    .hype-top{display:flex;justify-content:space-between;margin-bottom:8px}
    .hype-label{font-size:10px;letter-spacing:0.2em;color:#444;text-transform:uppercase}
    .hype-count{font-size:10px;color:var(--accent);letter-spacing:0.1em}
    .hype-track{width:100%;height:4px;background:#12121e;border-radius:2px}
    .hype-fill{height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;width:0%;transition:width 1s ease}

    /* REACTION */
    #reaction-section{margin-bottom:2rem;display:none}
    .reaction-btn{background:#0e0e1a;border:0.5px solid #1e1e2e;border-radius:20px;padding:8px 20px;cursor:pointer;font-size:18px;transition:transform 0.1s,border-color 0.2s;display:inline-flex;align-items:center;gap:8px}
    .reaction-btn:hover{border-color:var(--accent);transform:scale(1.05)}
    .reaction-btn:active{transform:scale(0.95)}
    .reaction-count{font-size:13px;color:#ccc;font-family:'Segoe UI',sans-serif;font-weight:600}
    .reaction-burst{position:fixed;pointer-events:none;font-size:24px;z-index:999;animation:burst 0.8s ease forwards}
    @keyframes burst{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}

    /* PHASE BADGE */
    #phase-badge{display:none;background:#0e0e1a;border:0.5px solid var(--accent);border-radius:4px;padding:4px 12px;font-size:10px;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase;margin-bottom:1rem}

    /* CLUES */
    #clues-section{width:100%;max-width:500px;margin-bottom:2rem;display:none;flex-direction:column;gap:10px}
    .clue-item{background:#0e0e1a;border:0.5px solid #2a1a3a;border-left:2px solid var(--accent);border-radius:0 6px 6px 0;padding:10px 14px;font-size:13px;color:#ccc;letter-spacing:0.03em;animation:fadeInUp 0.5s ease forwards;opacity:0}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .clue-label{font-size:9px;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase;margin-bottom:4px}

    /* FOLLOWER BAR */
    #follower-section{width:100%;max-width:400px;margin-bottom:2rem;display:none}
    .follower-label{font-size:10px;letter-spacing:0.2em;color:#444;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between}
    .follower-track{width:100%;height:4px;background:#12121e;border-radius:2px}
    .follower-fill{height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 1s ease}

    /* MILESTONE BADGES */
    #milestones-section{width:100%;max-width:500px;margin-bottom:2rem;display:none;flex-wrap:wrap;gap:8px;justify-content:center}
    .milestone-badge{background:#0e0e1a;border:0.5px solid #2a2a3a;border-radius:20px;padding:5px 14px;font-size:11px;color:#555;letter-spacing:0.08em;display:flex;align-items:center;gap:6px}
    .milestone-badge.unlocked{border-color:var(--accent);color:#ccc}
    .milestone-badge .badge-icon{font-size:14px}

    /* SOCIAL */
    .social-row{display:flex;gap:10px;margin-bottom:2.5rem;flex-wrap:wrap;justify-content:center}
    .social-btn{display:inline-flex;align-items:center;gap:6px;background:#0e0e1a;border:0.5px solid #1e1e2e;border-radius:20px;padding:7px 16px;text-decoration:none;font-size:12px;color:#ccc;letter-spacing:0.05em;transition:border-color 0.2s,color 0.2s;cursor:pointer}
    .social-btn:hover{border-color:var(--accent);color:#fff}
    .social-btn svg{width:14px;height:14px;flex-shrink:0}

    /* SNAKE GAME */
    #snake-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:998;backdrop-filter:blur(4px)}
    #snake-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0a0a14;border:1px solid var(--accent);border-radius:12px;z-index:999;padding:1.5rem;width:min(420px,95vw)}
    #snake-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
    #snake-title{font-size:12px;font-weight:800;color:var(--accent);letter-spacing:0.2em;text-transform:uppercase}
    #snake-score-display{font-size:11px;color:#555;letter-spacing:0.08em;font-family:'Courier New',monospace}
    #snake-close-btn{background:none;border:none;color:#444;font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;transition:color .2s}
    #snake-close-btn:hover{color:#fff}
    #snake-canvas{display:block;border:.5px solid #1e1e2e;border-radius:6px;background:#080810;width:100%;height:auto}
    #snake-ui{margin-top:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    #snake-msg{font-size:11px;color:#555;letter-spacing:0.08em}
    #snake-start-btn{background:var(--accent);border:none;border-radius:4px;color:#fff;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:7px 18px;cursor:pointer;transition:background .2s}
    #snake-start-btn:hover{background:var(--accent2)}
    #snake-controls{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:10px}
    #snake-controls .ctrl-row{display:flex;gap:4px}
    .ctrl-btn{width:36px;height:36px;background:#0e0e1a;border:.5px solid #1e1e2e;border-radius:6px;color:#666;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;user-select:none;-webkit-user-select:none}
    .ctrl-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}

    /* CURSOR */
    *{cursor:none!important}
    #custom-cursor{position:fixed;width:16px;height:16px;border:1.5px solid var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.08s,width 0.15s,height 0.15s,opacity 0.15s;opacity:0.8}
    #custom-cursor.clicked{width:24px;height:24px;opacity:0.4}
    #cursor-dot{position:fixed;width:4px;height:4px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}

    /* SOUND */
    #sound-btn{position:fixed;bottom:24px;right:24px;z-index:10;background:#0e0e1a;border:0.5px solid #1e1e2e;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:none!important;transition:border-color 0.2s}
    #sound-btn:hover{border-color:var(--accent)}
    #sound-btn svg{width:16px;height:16px;fill:#555;pointer-events:none}
    #sound-btn.active svg{fill:var(--accent)}

    /* REVEAL + CONFETTI */
    #reveal-content{display:none;flex-direction:column;align-items:center;gap:1rem;margin-top:1rem}
    .ended-msg{font-size:28px;font-weight:800;color:var(--accent);letter-spacing:0.08em;text-transform:uppercase;text-align:center}
    #reveal-text{font-size:16px;color:#ccc;text-align:center;max-width:480px;line-height:1.7;display:none}
    #reveal-link{display:none;margin-top:0.5rem;padding:10px 28px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none;border-radius:4px}
    #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:50}

    /* FOOTER */
    footer{position:relative;z-index:3;padding:1.5rem;text-align:center;margin-top:auto;width:100%}
    footer a{font-size:10px;letter-spacing:0.15em;color:#2a2a3a;text-transform:uppercase;text-decoration:none;margin:0 12px;transition:color 0.2s}
    footer a:hover{color:var(--accent)}

    @media(max-width:480px){
      .flip-box{min-width:64px;padding:14px 4px 10px}
      .num{font-size:30px}
      .countdown{gap:6px}
      .progress-track{width:260px}
      .social-row{gap:8px}
      .social-btn{font-size:11px;padding:6px 12px}
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <canvas id="confetti-canvas"></canvas>
  <div class="scanlines"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="custom-cursor"></div>
  <div id="cursor-dot"></div>

  <div id="announcement-banner">
    <span id="banner-text"></span>
    <a id="banner-link" href="#" style="display:none"></a>
    <button id="banner-close" onclick="closeBanner()">&#x2715;</button>
  </div>

  <div id="snake-overlay" onclick="closeSnake()"></div>
  <div id="snake-modal">
    <div id="snake-header">
      <div id="snake-title">// Snake //</div>
      <div id="snake-score-display">SCORE: <span id="snake-score">0</span> &nbsp; BEST: <span id="snake-best">0</span></div>
      <button id="snake-close-btn" onclick="closeSnake()">✕</button>
    </div>
    <canvas id="snake-canvas" width="380" height="320"></canvas>
    <div id="snake-ui">
      <span id="snake-msg">Click Start or press Space</span>
      <button id="snake-start-btn" onclick="snakeStart()">Start</button>
    </div>
    <div id="snake-controls">
      <div class="ctrl-row"><button class="ctrl-btn" id="btn-up" onpointerdown="snakeDir(0,-1)">▲</button></div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-left" onpointerdown="snakeDir(-1,0)">◀</button>
        <button class="ctrl-btn" id="btn-down" onpointerdown="snakeDir(0,1)">▼</button>
        <button class="ctrl-btn" id="btn-right" onpointerdown="snakeDir(1,0)">▶</button>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="phase-badge"></div>
    <div class="eyebrow" id="eyebrow-text"><span id="typing-text"></span><span class="cursor"></span></div>

    <div class="logo" id="logo">
      <span class="logo-dark">DARK</span><span class="logo-files">ARROW</span>
    </div>

    <div id="tagline">Friday · April 24 · 5:30 PM EST</div>

    <a class="twitch-link" id="twitch-link" href="https://twitch.tv/not_darkarrow" target="_blank">
      <svg class="twitch-icon" viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
      <span class="twitch-name" id="twitch-name">not_darkarrow</span>
    </a>

    <div class="countdown" id="countdown-wrap">
      <div class="unit"><div class="flip-box"><span class="num" id="dd">00</span><div class="lbl">days</div></div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="flip-box"><span class="num" id="hh">00</span><div class="lbl">hours</div></div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="flip-box"><span class="num" id="mm">00</span><div class="lbl">mins</div></div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="flip-box"><span class="num" id="ss">00</span><div class="lbl">secs</div></div></div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="pbar"></div></div>
    <div class="status"><div class="dot"></div><span class="status-text">live countdown</span><div class="dot"></div></div>

    <div id="hype-section">
      <div class="hype-top"><span class="hype-label">Hype Meter</span><span class="hype-count" id="hype-num">0 hyped</span></div>
      <div class="hype-track"><div class="hype-fill" id="hype-fill"></div></div>
    </div>

    <div id="reaction-section">
      <button class="reaction-btn" id="reaction-btn" onclick="addReaction(event)">
        🔥 <span class="reaction-count" id="reaction-count">0</span>
      </button>
    </div>

    <div id="clues-section"></div>
    <div id="milestones-section"></div>

    <div id="follower-section">
      <div class="follower-label">
        <span id="follower-label-text">Follower Goal</span>
        <span id="follower-count-text">0 / 0</span>
      </div>
      <div class="follower-track"><div class="follower-fill" id="follower-fill" style="width:0%"></div></div>
    </div>

    <div class="social-row">
      <a class="social-btn" id="discord-btn" href="#" target="_blank" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discord
      </a>
      <a class="social-btn" onclick="shareTwitter()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Share on X
      </a>
    </div>

    <div id="reveal-content">
      <div class="ended-msg" id="ended-msg">It's time.</div>
      <div id="reveal-text"></div>
      <a id="reveal-link" href="#">Go</a>
    </div>
  </div>

  <footer>
    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">Terms of Service</a>
    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">Privacy Policy</a>
    <span class="zenian-badge" onclick="openZenian()">⚡ Zenian</span>
  </footer>

  <button id="sound-btn" onclick="toggleSound()" title="Toggle ambient sound">
    <svg id="sound-icon-on" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <svg id="sound-icon-off" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
  </button>

<script>
// ── settings.js must load first ──
async function initPage(){
  const st = await window.DF.getSettings();
  function s(k){ return st[k]!==undefined?st[k]:window.DF.DEFAULTS[k]; }

  // Accent
  const ac=s('accentColor')||'#6b21a8';
  document.documentElement.style.setProperty('--accent',ac);
  const r=parseInt(ac.slice(1,3),16),g=parseInt(ac.slice(3,5),16),b=parseInt(ac.slice(5,7),16);
  document.documentElement.style.setProperty('--accent2',`rgb(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)})`);

  // Meta
  document.title=s('pageTitle')||'darkarrow.lol — something is coming';
  document.querySelector('meta[property="og:title"]').content=s('pageTitle');
  document.querySelector('meta[property="og:description"]').content=s('ogDescription');
  document.querySelector('meta[name="twitter:description"]').content=s('ogDescription');

  // Text
  document.getElementById('tagline').textContent=s('tagline');
  document.getElementById('twitch-name').textContent=s('twitchName');
  document.getElementById('twitch-link').href='https://twitch.tv/'+s('twitchName');

  // Typing eyebrow
  (function(){const txt=s('eyebrow');let i=0;const el=document.getElementById('typing-text');function type(){if(i<=txt.length){el.textContent=txt.slice(0,i);i++;setTimeout(type,i===1?600:55);}}type();})();

  // Phase badge
  const phases=s('phases'),cp=s('currentPhase');
  if(phases&&phases.length&&phases[cp]){const pb=document.getElementById('phase-badge');pb.textContent=phases[cp].label||('Phase '+(cp+1));pb.style.display='inline-block';}

  // Discord btn
  if(s('discordEnabled')&&s('discordURL')){const db=document.getElementById('discord-btn');db.href=s('discordURL');db.style.display='inline-flex';}

  // Clues
  if(s('cluesEnabled')&&s('clues').length){
    const sec=document.getElementById('clues-section');sec.style.display='flex';
    s('clues').forEach((c,i)=>{const el=document.createElement('div');el.className='clue-item';el.style.animationDelay=(i*0.2)+'s';el.innerHTML=`<div class="clue-label">Clue #${i+1}</div>${c}`;sec.appendChild(el);});
  }

  // Follower bar
  if(s('followerEnabled')&&s('followerGoal')>0){
    document.getElementById('follower-section').style.display='block';
    document.getElementById('follower-label-text').textContent=s('followerLabel');
    document.getElementById('follower-count-text').textContent=s('followerCurrent').toLocaleString()+' / '+s('followerGoal').toLocaleString();
    const pct=Math.min(100,(s('followerCurrent')/s('followerGoal'))*100);
    setTimeout(()=>{document.getElementById('follower-fill').style.width=pct+'%';},300);
  }

  // Hype meter
  if(s('hypeEnabled')&&s('hypeGoal')>0){
    document.getElementById('hype-section').style.display='block';
    const visits=parseInt(localStorage.getItem('df_hype')||'0')+1;
    localStorage.setItem('df_hype',visits);
    document.getElementById('hype-num').textContent=visits.toLocaleString()+' hyped';
    setTimeout(()=>{document.getElementById('hype-fill').style.width=Math.min(100,(visits/s('hypeGoal'))*100)+'%';},400);
  }

  // Reactions
  if(s('reactionEnabled')){
    document.getElementById('reaction-section').style.display='block';
    document.getElementById('reaction-count').textContent=parseInt(localStorage.getItem('df_reactions')||'0').toLocaleString();
  }

  // Milestones
  if(s('milestonesEnabled')&&s('milestones').length){
    const ms=document.getElementById('milestones-section');ms.style.display='flex';
    s('milestones').forEach(m=>{const el=document.createElement('div');const unlocked=s('followerCurrent')>=(m.threshold||0);el.className='milestone-badge'+(unlocked?' unlocked':'');el.innerHTML=`<span class="badge-icon">${m.icon||'⭐'}</span>${m.label}`;ms.appendChild(el);});
  }

  // Announcement banner
  if(s('announcementEnabled')&&s('announcementText')&&!sessionStorage.getItem('banner_dismissed')){
    const b=document.getElementById('announcement-banner');
    b.className='style-'+(s('announcementStyle')||'purple');
    document.getElementById('banner-text').textContent=s('announcementText');
    if(s('announcementLinkURL')){const a=document.getElementById('banner-link');a.href=s('announcementLinkURL');a.textContent=s('announcementLinkLabel')||'Learn more';a.target='_blank';a.style.display='inline';}
    b.style.display='block';document.body.style.paddingTop=b.offsetHeight+'px';
  }

  // Countdown
  const target=new Date(s('targetDate')).getTime();
  const totalMs=Math.max(1,target-Date.now());
  function pad(n){return String(Math.max(0,n)).padStart(2,'0');}
  let prev={dd:'',hh:'',mm:'',ss:''};
  function flipNum(id,val){
    if(prev[id]===val)return;prev[id]=val;
    const el=document.getElementById(id);
    el.classList.add('flip-out');
    setTimeout(()=>{el.textContent=val;el.classList.remove('flip-out');el.classList.add('flip-in');setTimeout(()=>el.classList.remove('flip-in'),150);},150);
  }
  let revealed=false;
  function tick(){
    const diff=target-Date.now();
    if(diff<=0&&!revealed){
      revealed=true;
      document.getElementById('countdown-wrap').style.display='none';
      document.querySelector('.progress-track').style.display='none';
      document.querySelector('.status').style.display='none';
      const rc=document.getElementById('reveal-content');rc.style.display='flex';
      document.getElementById('ended-msg').textContent=s('endedMessage');
      const rt=s('revealText');if(rt){document.getElementById('reveal-text').textContent=rt;document.getElementById('reveal-text').style.display='block';}
      const rl=s('revealLinkURL');if(rl){const a=document.getElementById('reveal-link');a.href=rl;a.textContent=s('revealLinkLabel')||'Go';a.style.display='inline-block';}
      document.getElementById('pbar').style.width='100%';
      launchConfetti();
      setTimeout(()=>window.location.href='reveal.html',2000);
      return;
    }
    flipNum('dd',pad(Math.floor(diff/86400000)));
    flipNum('hh',pad(Math.floor((diff%86400000)/3600000)));
    flipNum('mm',pad(Math.floor((diff%3600000)/60000)));
    flipNum('ss',pad(Math.floor((diff%60000)/1000)));
    document.getElementById('pbar').style.width=Math.min(100,((totalMs-diff)/totalMs)*100).toFixed(2)+'%';
  }
  tick();setInterval(tick,1000);

  // Glitch logo
  const logo=document.getElementById('logo');
  function triggerGlitch(){logo.classList.add('glitching');setTimeout(()=>logo.classList.remove('glitching'),400);}
  setInterval(()=>{if(Math.random()<0.25)triggerGlitch();},3500);
  logo.addEventListener('mouseenter',triggerGlitch);

  // Snake easter egg
  let clickCount=0,clickTimer=null;
  const secretClicks=s('secretClicks')||7;
  logo.addEventListener('click',()=>{clickCount++;clearTimeout(clickTimer);clickTimer=setTimeout(()=>clickCount=0,2000);if(clickCount>=secretClicks){clickCount=0;openSnake();}});

  // Particles
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  function resizeC(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resizeC();window.addEventListener('resize',resizeC);
  const pts=Array.from({length:60},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.5+0.3,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,a:Math.random()*0.35+0.05}));
  function drawP(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=ac+Math.floor(p.a*255).toString(16).padStart(2,'0');ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;});requestAnimationFrame(drawP);}
  drawP();
}

// ── SNAKE (sync, needs DOM) ──
function openSnake(){document.getElementById('snake-overlay').style.display='block';document.getElementById('snake-modal').style.display='block';snakeDraw();}
function closeSnake(){document.getElementById('snake-overlay').style.display='none';document.getElementById('snake-modal').style.display='none';snakeRunning=false;clearInterval(snakeLoop);}
const SC=document.getElementById('snake-canvas'),SX=SC.getContext('2d');
const COLS=19,ROWS=16,CELL=20;SC.width=COLS*CELL;SC.height=ROWS*CELL;
let snake,dir,nextDir,food,snakeRunning=false,snakeLoop,score=0,best=0;
function snakeInit(){snake=[{x:9,y:8},{x:8,y:8},{x:7,y:8}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;document.getElementById('snake-score').textContent=0;spawnFood();snakeDraw();}
function spawnFood(){do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}while(snake.some(p=>p.x===food.x&&p.y===food.y));}
function snakeDir(dx,dy){if(dx!==0&&dir.x!==0)return;if(dy!==0&&dir.y!==0)return;nextDir={x:dx,y:dy};}
function snakeStep(){dir=nextDir;const head={x:(snake[0].x+dir.x+COLS)%COLS,y:(snake[0].y+dir.y+ROWS)%ROWS};if(snake.some(p=>p.x===head.x&&p.y===head.y)){snakeGameOver();return;}snake.unshift(head);if(head.x===food.x&&head.y===food.y){score++;document.getElementById('snake-score').textContent=score;if(score>best){best=score;document.getElementById('snake-best').textContent=best;}spawnFood();}else{snake.pop();}snakeDraw();}
function snakeDraw(){const acc=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#6b21a8';SX.fillStyle='#080810';SX.fillRect(0,0,SC.width,SC.height);SX.fillStyle='#0e0e18';for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++)SX.fillRect(x*CELL+CELL/2-1,y*CELL+CELL/2-1,2,2);SX.fillStyle=acc;SX.shadowColor=acc;SX.shadowBlur=8;SX.beginPath();SX.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-3,0,Math.PI*2);SX.fill();SX.shadowBlur=0;snake.forEach((seg,i)=>{const al=i===0?1:Math.max(0.25,1-i/snake.length*0.6);SX.fillStyle=i===0?acc:`rgba(107,33,168,${al})`;if(i===0){SX.shadowColor=acc;SX.shadowBlur=6;}const p=i===0?1:2;SX.beginPath();SX.roundRect(seg.x*CELL+p,seg.y*CELL+p,CELL-p*2,CELL-p*2,3);SX.fill();SX.shadowBlur=0;});if(!snakeRunning){SX.fillStyle='rgba(8,8,16,0.6)';SX.fillRect(0,0,SC.width,SC.height);SX.fillStyle=acc;SX.font='700 14px Courier New';SX.textAlign='center';SX.fillText(score>0?'GAME OVER':'PRESS START',SC.width/2,SC.height/2-8);if(score>0){SX.fillStyle='#555';SX.font='11px Courier New';SX.fillText('Score: '+score,SC.width/2,SC.height/2+12);}SX.textAlign='left';}}
function snakeStart(){snakeInit();snakeRunning=true;clearInterval(snakeLoop);snakeLoop=setInterval(snakeStep,130);document.getElementById('snake-msg').textContent='Arrow keys or buttons';document.getElementById('snake-start-btn').textContent='Restart';}
function snakeGameOver(){snakeRunning=false;clearInterval(snakeLoop);document.getElementById('snake-msg').textContent='Game over! Score: '+score;snakeDraw();}
document.addEventListener('keydown',e=>{if(document.getElementById('snake-modal').style.display==='none')return;if(e.code==='Space'){e.preventDefault();snakeStart();return;}const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};if(map[e.code]){e.preventDefault();snakeDir(...map[e.code]);}});
let tx=0,ty=0;SC.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});SC.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy))snakeDir(dx>0?1:-1,0);else snakeDir(0,dy>0?1:-1);},{passive:true});
snakeInit();

// ── CONFETTI ──
function launchConfetti(){const cc=document.getElementById('confetti-canvas');cc.width=innerWidth;cc.height=innerHeight;const cx=cc.getContext('2d');const ac2=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#6b21a8';const pieces=Array.from({length:150},()=>({x:Math.random()*innerWidth,y:-10,r:Math.random()*6+3,d:Math.random()*150,color:[ac2,'#a855f7','#f0f0f0','#fff'][Math.floor(Math.random()*4)],tilt:Math.random()*10-10,tiltSpeed:Math.random()*0.1+0.05,speed:Math.random()*3+2}));let frame=0;function draw(){cx.clearRect(0,0,cc.width,cc.height);pieces.forEach(p=>{cx.beginPath();cx.ellipse(p.x,p.y,p.r,p.r*0.4,p.tilt,0,Math.PI*2);cx.fillStyle=p.color;cx.fill();p.y+=p.speed;p.x+=Math.sin(frame*0.01+p.d)*1.5;p.tilt+=p.tiltSpeed;});frame++;if(frame<300)requestAnimationFrame(draw);else cx.clearRect(0,0,cc.width,cc.height);}draw();}

// ── CURSOR ──
const cur=document.getElementById('custom-cursor'),dot=document.getElementById('cursor-dot');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';});
document.addEventListener('mousedown',()=>cur.classList.add('clicked'));
document.addEventListener('mouseup',()=>cur.classList.remove('clicked'));

// ── SOUND ──
let audioCtx=null,gainNode=null,soundOn=false;
function buildAudio(){audioCtx=new(window.AudioContext||window.webkitAudioContext)();gainNode=audioCtx.createGain();gainNode.gain.value=0;gainNode.connect(audioCtx.destination);[[55,'sine',0.3],[110,'sine',0.15],[27.5,'triangle',0.1]].forEach(([f,t,g])=>{const o=audioCtx.createOscillator(),gn=audioCtx.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;o.connect(gn);gn.connect(gainNode);o.start();});}
function toggleSound(){if(!audioCtx)buildAudio();soundOn=!soundOn;gainNode.gain.linearRampToValueAtTime(soundOn?0.12:0,audioCtx.currentTime+1.5);document.getElementById('sound-icon-on').style.display=soundOn?'block':'none';document.getElementById('sound-icon-off').style.display=soundOn?'none':'block';document.getElementById('sound-btn').classList.toggle('active',soundOn);}

// ── BANNER/SHARE/REACTION ──
function closeBanner(){document.getElementById('announcement-banner').style.display='none';document.body.style.paddingTop='0';sessionStorage.setItem('banner_dismissed','1');}
function shareTwitter(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Something big is dropping at darkarrow.lol 👀 '+window.location.href),'_blank');}
function addReaction(e){let c=parseInt(localStorage.getItem('df_reactions')||'0')+1;localStorage.setItem('df_reactions',c);document.getElementById('reaction-count').textContent=c.toLocaleString();const b=document.createElement('div');b.className='reaction-burst';b.textContent='🔥';b.style.left=e.clientX+'px';b.style.top=e.clientY+'px';document.body.appendChild(b);setTimeout(()=>b.remove(),800);}

// ── BOOT ──
window.addEventListener('DOMContentLoaded',initPage);
</script>

<script src="settings.js"></script>
<script src="zenian.js"></script>
