<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Files — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080810; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; color: #ccc; }

    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box {
      background: #0e0e1a; border: 0.5px solid #1e1e2e; border-radius: 10px;
      padding: 2.5rem 2rem; width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 1.2rem;
    }
    .login-title { font-size: 18px; font-weight: 800; color: #f0f0f0; letter-spacing: -0.02em; text-align: center; }
    .login-title span { color: #6b21a8; }
    .login-box label { font-size: 11px; letter-spacing: 0.15em; color: #444; text-transform: uppercase; display: block; margin-bottom: 5px; }
    .login-box input { width: 100%; background: #080810; border: 0.5px solid #2a2a3a; border-radius: 6px; padding: 10px 12px; color: #f0f0f0; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .login-box input:focus { border-color: #6b21a8; }
    .login-btn { width: 100%; padding: 11px; background: #6b21a8; border: none; border-radius: 6px; color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .login-btn:hover { background: #7c3aed; }
    .login-error { font-size: 12px; color: #e24b4b; text-align: center; display: none; }

    #admin-screen { display: none; }
    .topbar { background: #0a0a14; border-bottom: 0.5px solid #1e1e2e; padding: 14px 2rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar-title { font-size: 15px; font-weight: 800; color: #f0f0f0; letter-spacing: -0.01em; }
    .topbar-title span { color: #6b21a8; }
    .logout-btn { background: transparent; border: 0.5px solid #2a2a3a; border-radius: 6px; padding: 6px 14px; color: #666; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .logout-btn:hover { color: #f0f0f0; border-color: #555; }

    .admin-body { max-width: 680px; margin: 0 auto; padding: 2.5rem 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .section { background: #0e0e1a; border: 0.5px solid #1e1e2e; border-radius: 10px; padding: 1.5rem; }
    .section-title { font-size: 11px; letter-spacing: 0.2em; color: #6b21a8; text-transform: uppercase; margin-bottom: 1.2rem; padding-bottom: 0.7rem; border-bottom: 0.5px solid #1e1e2e; display: flex; align-items: center; justify-content: space-between; }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-label { font-size: 11px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; }
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #1e1e2e; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; bottom: 3px; background: #444; border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .toggle input:checked + .toggle-slider { background: #6b21a8; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #fff; }

    .field { margin-bottom: 1.1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 11px; letter-spacing: 0.12em; color: #555; text-transform: uppercase; display: block; margin-bottom: 6px; }
    .field input, .field textarea, .field select {
      width: 100%; background: #080810; border: 0.5px solid #2a2a3a;
      border-radius: 6px; padding: 10px 12px; color: #f0f0f0;
      font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: #6b21a8; }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field select option { background: #0e0e1a; }
    .field .hint { font-size: 11px; color: #333; margin-top: 5px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Banner preview */
    .banner-preview { border-radius: 6px; padding: 10px 14px; font-size: 13px; font-weight: 600; margin-top: 12px; display: none; position: relative; }
    .banner-preview.style-red   { background: #6b21a8; color: #fff; }
    .banner-preview.style-dark  { background: #1a1a2a; color: #f0f0f0; border: 0.5px solid #2a2a3a; }
    .banner-preview.style-white { background: #f0f0f0; color: #080810; }
    .preview-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.6; margin-bottom: 4px; display: block; }

    .save-btn { width: 100%; padding: 13px; background: #6b21a8; border: none; border-radius: 6px; color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .save-btn:hover { background: #7c3aed; }
    .preview-link { display: inline-block; font-size: 11px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; margin-top: 0.5rem; transition: color 0.2s; }
    .preview-link:hover { color: #6b21a8; }

    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1a2a1a; border: 0.5px solid #3b6d11; border-radius: 6px; padding: 10px 20px; font-size: 12px; color: #97c459; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <div class="login-title">DARK <span>FILES</span> — Admin</div>
      <div>
        <label>Username</label>
        <input type="text" id="u" placeholder="username" autocomplete="off" />
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="p" placeholder="password" />
      </div>
      <div class="login-error" id="login-error">Incorrect credentials.</div>
      <button class="login-btn" onclick="doLogin()">Enter</button>
    </div>
  </div>

  <div id="admin-screen">
    <div class="topbar">
      <div class="topbar-title">DARK <span>FILES</span> — Admin Panel</div>
      <button class="logout-btn" onclick="doLogout()">Log out</button>
    </div>

    <div class="admin-body">

      <!-- ANNOUNCEMENT BANNER -->
      <div class="section">
        <div class="section-title">
          Announcement Banner
          <div class="toggle-wrap">
            <span class="toggle-label" id="banner-toggle-label">Off</span>
            <label class="toggle">
              <input type="checkbox" id="f-banner-enabled" onchange="updateBannerPreview()" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="field">
          <label>Banner Message</label>
          <input type="text" id="f-banner-text" placeholder="New stream announcement, update, etc..." oninput="updateBannerPreview()" />
        </div>
        <div class="field-row">
          <div class="field">
            <label>Link Label (optional)</label>
            <input type="text" id="f-banner-linklabel" placeholder="Watch Now" oninput="updateBannerPreview()" />
          </div>
          <div class="field">
            <label>Link URL (optional)</label>
            <input type="text" id="f-banner-linkurl" placeholder="https://twitch.tv/..." />
          </div>
        </div>
        <div class="field">
          <label>Banner Style</label>
          <select id="f-banner-style" onchange="updateBannerPreview()">
            <option value="red">Red (default)</option>
            <option value="dark">Dark</option>
            <option value="white">White</option>
          </select>
        </div>
        <div class="banner-preview" id="banner-preview">
          <span class="preview-label">Preview</span>
          <span id="preview-text">Your message here</span>
          <span id="preview-link" style="margin-left:8px; font-weight:700; display:none;"></span>
        </div>
      </div>

      <!-- COUNTDOWN TARGET -->
      <div class="section">
        <div class="section-title">Countdown Target</div>
        <div class="field">
          <label>End Date &amp; Time</label>
          <input type="datetime-local" id="f-date" />
          <div class="hint">Set the exact date and time the countdown hits zero.</div>
        </div>
        <div class="field">
          <label>Timezone Offset</label>
          <input type="text" id="f-tz" placeholder="-05:00" />
          <div class="hint">EST = -05:00 &nbsp;|&nbsp; EDT = -04:00 &nbsp;|&nbsp; UTC = +00:00</div>
        </div>
      </div>

      <!-- PAGE TEXT -->
      <div class="section">
        <div class="section-title">Page Text</div>
        <div class="field">
          <label>Eyebrow Text</label>
          <input type="text" id="f-eyebrow" placeholder="classified /// eyes only" />
        </div>
        <div class="field">
          <label>Tagline (below logo)</label>
          <input type="text" id="f-tagline" placeholder="Friday · April 24 · 5:30 PM EST" />
        </div>
        <div class="field">
          <label>Twitch Username</label>
          <input type="text" id="f-twitch" placeholder="not_darkarrow" />
        </div>
      </div>

      <!-- WHEN TIMER ENDS -->
      <div class="section">
        <div class="section-title">When Timer Ends</div>
        <div class="field">
          <label>Big Message</label>
          <input type="text" id="f-ended" placeholder="It's time." />
        </div>
        <div class="field">
          <label>Reveal Text (optional paragraph)</label>
          <textarea id="f-revealtext" placeholder="Write anything you want shown after the countdown ends..."></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Button Label</label>
            <input type="text" id="f-linklabel" placeholder="Watch Now" />
          </div>
          <div class="field">
            <label>Button URL</label>
            <input type="text" id="f-linkurl" placeholder="https://twitch.tv/not_darkarrow" />
          </div>
        </div>
      </div>

      <button class="save-btn" onclick="saveSettings()">Save &amp; Apply Changes</button>
      <a href="/" class="preview-link">← View live site</a>
    </div>
  </div>

  <div class="toast" id="toast">Saved!</div>

  <script>
    const CREDS = { username: 'xander', password: 'xander' };
    const DEFAULTS = {
      targetDate: '2026-04-24T17:30:00',
      targetTZ: '-05:00',
      tagline: 'Friday · April 24 · 5:30 PM EST',
      eyebrow: 'classified /// eyes only',
      twitchName: 'not_darkarrow',
      endedMessage: "It's time.",
      revealText: '',
      revealLinkLabel: '',
      revealLinkURL: '',
      announcementText: '',
      announcementLinkLabel: '',
      announcementLinkURL: '',
      announcementStyle: 'red',
      announcementEnabled: false,
    };

    function getSettings() {
      try { return JSON.parse(localStorage.getItem('darkfiles_settings')) || {}; }
      catch { return {}; }
    }

    function doLogin() {
      const u = document.getElementById('u').value.trim();
      const p = document.getElementById('p').value;
      if (u === CREDS.username && p === CREDS.password) {
        sessionStorage.setItem('df_auth', '1');
        showAdmin();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }
    document.getElementById('p').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('u').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function doLogout() {
      sessionStorage.removeItem('df_auth');
      document.getElementById('admin-screen').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }

    function showAdmin() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadFields();
    }

    function loadFields() {
      const s = getSettings();
      function v(k) { return s[k] !== undefined ? s[k] : DEFAULTS[k]; }
      document.getElementById('f-date').value = v('targetDate');
      document.getElementById('f-tz').value = v('targetTZ');
      document.getElementById('f-tagline').value = v('tagline');
      document.getElementById('f-eyebrow').value = v('eyebrow');
      document.getElementById('f-twitch').value = v('twitchName');
      document.getElementById('f-ended').value = v('endedMessage');
      document.getElementById('f-revealtext').value = v('revealText');
      document.getElementById('f-linklabel').value = v('revealLinkLabel');
      document.getElementById('f-linkurl').value = v('revealLinkURL');
      document.getElementById('f-banner-text').value = v('announcementText');
      document.getElementById('f-banner-linklabel').value = v('announcementLinkLabel');
      document.getElementById('f-banner-linkurl').value = v('announcementLinkURL');
      document.getElementById('f-banner-style').value = v('announcementStyle');
      document.getElementById('f-banner-enabled').checked = v('announcementEnabled');
      updateBannerPreview();
    }

    function updateBannerPreview() {
      const enabled = document.getElementById('f-banner-enabled').checked;
      const text = document.getElementById('f-banner-text').value;
      const style = document.getElementById('f-banner-style').value;
      const linkLabel = document.getElementById('f-banner-linklabel').value;
      const preview = document.getElementById('banner-preview');
      const toggleLabel = document.getElementById('banner-toggle-label');

      toggleLabel.textContent = enabled ? 'On' : 'Off';

      if (text) {
        preview.style.display = 'block';
        preview.className = 'banner-preview style-' + style;
        document.getElementById('preview-text').textContent = text;
        const pl = document.getElementById('preview-link');
        if (linkLabel) { pl.textContent = linkLabel; pl.style.display = 'inline'; }
        else { pl.style.display = 'none'; }
      } else {
        preview.style.display = 'none';
      }
    }

    function saveSettings() {
      const settings = {
        targetDate: document.getElementById('f-date').value || DEFAULTS.targetDate,
        targetTZ: document.getElementById('f-tz').value || DEFAULTS.targetTZ,
        tagline: document.getElementById('f-tagline').value,
        eyebrow: document.getElementById('f-eyebrow').value,
        twitchName: document.getElementById('f-twitch').value,
        endedMessage: document.getElementById('f-ended').value,
        revealText: document.getElementById('f-revealtext').value,
        revealLinkLabel: document.getElementById('f-linklabel').value,
        revealLinkURL: document.getElementById('f-linkurl').value,
        announcementText: document.getElementById('f-banner-text').value,
        announcementLinkLabel: document.getElementById('f-banner-linklabel').value,
        announcementLinkURL: document.getElementById('f-banner-linkurl').value,
        announcementStyle: document.getElementById('f-banner-style').value,
        announcementEnabled: document.getElementById('f-banner-enabled').checked,
      };
      localStorage.setItem('darkfiles_settings', JSON.stringify(settings));
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    if (sessionStorage.getItem('df_auth') === '1') showAdmin();
  </script>
</body>
</html>
